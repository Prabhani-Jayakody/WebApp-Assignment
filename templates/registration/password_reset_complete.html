{% extends 'base.html' %}

{% block title %}Password Changed | ExpenseWise{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header text-center" 
                 style="background: linear-gradient(135deg, #0D3B35, #1B5E52); border: none; padding: 1.5rem;">
                <h4 class="mb-0" style="color: white;">
                    <i class="bi bi-check-circle"></i> Password Changed!
                </h4>
                <small style="color: #A7F3D0;">
                    Your password has been successfully reset.
                </small>
            </div>
            <div class="card-body text-center p-4">
                <i class="bi bi-check-circle-fill" style="font-size: 3rem; color: #34D399;"></i>
                <p class="mt-3" style="color: #1F2937; font-weight: 500;">
                    You can now log in with your new password.
                </p>
                <a href="{% url 'login' %}" class="btn mt-3" 
                   style="background: linear-gradient(135deg, #F59E0B, #D97706); color: #051E1A; padding: 10px 25px; border-radius: 10px; text-decoration: none; display: inline-block;">
                    <i class="bi bi-box-arrow-in-right"></i> Login Now
                </a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
