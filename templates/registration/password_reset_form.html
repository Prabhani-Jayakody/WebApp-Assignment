{% extends 'base.html' %}

{% block title %}Reset Password | ExpenseWise{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-5">
        <div class="card shadow" style="border-radius: 20px; overflow: hidden;">
            <div class="card-header text-center" 
                 style="background: linear-gradient(135deg, #0D3B35, #1B5E52); border: none; padding: 1.5rem;">
                <h4 class="mb-0" style="color: white;">
                    <i class="bi bi-key"></i> Reset Password
                </h4>
                <small style="color: #A7F3D0;">
                    Enter your email to receive a reset link.
                </small>
            </div>
            <div class="card-body p-4">
                <form method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label" style="color: #1B5E52; font-weight: 600;">Email Address</label>
                        <input type="email" name="email" class="form-control" placeholder="Enter your registered email" required
                               style="border-radius: 10px; border: 2px solid #E5E7EB; padding: 12px;">
                    </div>
                    
                    <button type="submit" class="btn w-100" 
                            style="background: linear-gradient(135deg, #F59E0B, #D97706); color: #051E1A; padding: 12px; border-radius: 10px; font-weight: 700; border: none;">
                        <i class="bi bi-envelope"></i> Send Reset Link
                    </button>
                </form>
                
                <div class="text-center mt-3">
                    <p style="color: #6B7280;">
                        Remember your password? 
                        <a href="{% url 'login' %}" style="color: #F59E0B; text-decoration: none;">Login</a>
                    </p>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .form-control:focus {
        border-color: #059669 !important;
        box-shadow: 0 0 0 3px rgba(5, 150, 105, 0.1) !important;
        outline: none;
    }
</style>
{% endblock %}
