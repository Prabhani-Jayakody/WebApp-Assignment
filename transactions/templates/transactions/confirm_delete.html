{% extends 'base.html' %}

{% block title %}Delete Transaction{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-danger text-white">
                <h4 class="mb-0">⚠️ Confirm Delete</h4>
            </div>
            <div class="card-body text-center">
                <p class="fs-5">Are you sure you want to delete this transaction?</p>
                <div class="alert alert-info">
                    <strong>{{ transaction.category }}</strong><br>
                    ${{ transaction.amount }} - {{ transaction.date }}
                </div>
                <form method="post">
                    {% csrf_token %}
                    <button type="submit" class="btn btn-danger">Yes, Delete</button>
                    <a href="{% url 'transaction_list' %}" class="btn btn-secondary">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
