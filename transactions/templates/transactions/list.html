{% extends 'base.html' %}
{% block content %}
<div class="container mt-4">
    <h3>My Transactions</h3>
    <a href="{% url 'add_transaction' %}" class="btn btn-success mb-3">+ Add New</a>
    <table class="table table-striped">
        <thead>
            <tr><th>Date</th><th>Type</th><th>Category</th><th>Amount</th><th>Actions</th></tr>
        </thead>
        <tbody>
            {% for t in transactions %}
            <tr>
                <td>{{ t.date }}</td>
                <td>{{ t.type }}</td>
                <td>{{ t.category }}</td>
                <td>Rs. {{ t.amount }}</td>
                <td>
                    <a href="{% url 'edit_transaction' t.pk %}" class="btn btn-sm btn-warning">Edit</a>
                    <a href="{% url 'delete_transaction' t.pk %}" class="btn btn-sm btn-danger">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
